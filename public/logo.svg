<svg width="180" height="36" viewBox="0 0 180 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Brain logomark - realistic silhouette -->
  <g transform="translate(0, 2) scale(0.85)">
    <!-- Left hemisphere with folds -->
    <path d="M19 6C14 4 9 7 7 12C5 17 6 20 8 23C6 24 5 27 6 30C7 33 11 35 15 34C16 34 17 33 18 32"
          stroke="url(#brain-g)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right hemisphere with folds -->
    <path d="M19 6C24 4 29 7 31 12C33 17 32 20 30 23C32 24 33 27 32 30C31 33 27 35 23 34C22 34 21 33 20 32"
          stroke="url(#brain-g)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Brain folds/sulci - left -->
    <path d="M10 14C12 15 14 13 16 15" stroke="url(#brain-g)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M9 19C11 20 14 18 17 20" stroke="url(#brain-g)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M8 24C10 23 13 25 16 24" stroke="url(#brain-g)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Brain folds/sulci - right -->
    <path d="M22 15C24 13 26 15 28 14" stroke="url(#brain-g)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M21 20C23 18 26 20 29 19" stroke="url(#brain-g)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M22 24C24 25 27 23 30 24" stroke="url(#brain-g)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Central fissure -->
    <path d="M19 6V32" stroke="url(#brain-g)" stroke-width="0.8" opacity="0.3" stroke-dasharray="2 2"/>
    <!-- Brain stem -->
    <path d="M17 32C18 35 20 35 21 32" stroke="url(#brain-g)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Activity hotspot -->
    <circle cx="14" cy="14" r="3" fill="url(#brain-g)" opacity="0.15"/>
    <circle cx="14" cy="14" r="1.5" fill="url(#brain-g)" opacity="0.4"/>
    <circle cx="25" cy="15" r="2.5" fill="url(#brain-g2)" opacity="0.12"/>
    <circle cx="25" cy="15" r="1.2" fill="url(#brain-g2)" opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <text x="38" y="26" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="21" font-weight="300" letter-spacing="-0.8">
    <tspan fill="url(#word-g)">mind</tspan><tspan fill="#52525b">.</tspan><tspan fill="#d4d4d8" font-weight="300">new</tspan>
  </text>

  <defs>
    <linearGradient id="brain-g" x1="5" y1="4" x2="33" y2="35">
      <stop offset="0%" stop-color="#cb6be5"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#29a167"/>
    </linearGradient>
    <linearGradient id="brain-g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5b400"/>
      <stop offset="100%" stop-color="#29a167"/>
    </linearGradient>
    <linearGradient id="word-g" x1="38" y1="10" x2="105" y2="30">
      <stop offset="0%" stop-color="#cb6be5"/>
      <stop offset="35%" stop-color="#9b6aff"/>
      <stop offset="70%" stop-color="#29a167"/>
      <stop offset="100%" stop-color="#f5b400"/>
    </linearGradient>
  </defs>
</svg>
