<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Brain logomark -->
  <g transform="translate(2, 4)">
    <!-- Left hemisphere -->
    <path d="M16 4C11 4 7 8 7 14C7 18 9 21 11 23C9 25 8 28 9 31C10 34 14 35 17 34" stroke="url(#logo-grad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Right hemisphere -->
    <path d="M16 4C21 4 25 8 25 14C25 18 23 21 21 23C23 25 24 28 23 31C22 34 18 35 15 34" stroke="url(#logo-grad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Neural activity dots -->
    <circle cx="12" cy="12" r="2.5" fill="url(#logo-grad)" opacity="0.7"/>
    <circle cx="20" cy="13" r="2" fill="url(#logo-grad2)" opacity="0.6"/>
    <circle cx="16" cy="20" r="1.5" fill="url(#logo-grad)" opacity="0.5"/>
  </g>

  <!-- Wordmark: mind.new -->
  <text x="38" y="28" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" letter-spacing="-0.5">
    <tspan fill="url(#word-grad)">mind</tspan><tspan fill="#71717a">.</tspan><tspan fill="#a1a1aa">new</tspan>
  </text>

  <defs>
    <linearGradient id="logo-grad" x1="7" y1="4" x2="25" y2="34">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="logo-grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#7c6aff"/>
    </linearGradient>
    <linearGradient id="word-grad" x1="38" y1="10" x2="120" y2="30">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="40%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
  </defs>
</svg>
